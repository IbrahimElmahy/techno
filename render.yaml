# Render Blueprint — deploys the FastAPI backend as a FREE web service.
# Database is a FREE, permanent Neon Postgres (https://neon.tech) — Render's own free Postgres expires
# after ~30 days, Neon's free tier does not. You paste the Neon connection string into DATABASE_URL when
# Render prompts (sync: false). See DEPLOY.md.
#
# In Render: New → Blueprint → connect this GitHub repo → Apply. After it's live you get a URL like
# https://techno-backend.onrender.com — put that in Vercel as VITE_API_URL, then redeploy the frontend.

services:
  - type: web
    name: techno-backend
    runtime: python
    plan: free
    rootDir: backend
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    # Create schema + seed demo data (idempotent), then serve.
    startCommand: python -m scripts.bootstrap && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false                  # you paste the free Neon Postgres connection string here
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret (not the dev default)
      - key: FRONTEND_ORIGINS
        value: https://techno-beryl-beta.vercel.app
      - key: PYTHONPATH
        value: .
      - key: ACCESS_TOKEN_TTL
        value: "1800"
